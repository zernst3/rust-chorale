# Deploy chorale QA harnesses to GitHub Pages.
#
# Live site: https://zernst3.github.io/rust-chorale/
#   /dioxus/  — Dioxus adapter QA harness
#   /leptos/  — Leptos adapter QA harness
#
# Manual trigger only. Visit Actions → "Deploy to GitHub Pages" → "Run
# workflow", check the harness(es) you want to deploy, and Run. Each
# checkbox is independent — deploy one, the other, or both. The job
# fails fast if neither is selected.
#
# ONE-TIME MANUAL STEP (Zach must do once after first merge to main):
#   GitHub repo → Settings → Pages → Source: "GitHub Actions"
#   Without this the deploy step will fail with a 404-style error.

name: Deploy to GitHub Pages

on:
  workflow_dispatch:
    inputs:
      deploy_dioxus:
        description: 'Deploy the Dioxus QA harness'
        type: boolean
        default: true
      deploy_leptos:
        description: 'Deploy the Leptos QA harness (currently under construction)'
        type: boolean
        default: false

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  pages: write
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Validate selection
        run: |
          if [ "${{ inputs.deploy_dioxus }}" != "true" ] && [ "${{ inputs.deploy_leptos }}" != "true" ]; then
            echo "::error::Neither checkbox is selected — nothing to deploy. Re-run with at least one harness checked."
            exit 1
          fi
          echo "Dioxus: ${{ inputs.deploy_dioxus }} | Leptos: ${{ inputs.deploy_leptos }}"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust + wasm32 target
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          targets: wasm32-unknown-unknown
          # Skip the default rustfmt/clippy installs to keep the runner fast.
          components: ""

      - name: Cache Cargo registry + build artefacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: pages-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: pages-${{ runner.os }}-

      # ── Dioxus toolchain + build ────────────────────────────────────────
      - name: Install dioxus-cli (dx)
        if: inputs.deploy_dioxus
        run: cargo install dioxus-cli --locked --version 0.7.0

      - name: Build Dioxus QA harness
        if: inputs.deploy_dioxus
        working-directory: examples/qa-harness
        run: dx build --release --base-path /rust-chorale/dioxus/

      # ── Leptos toolchain + build ────────────────────────────────────────
      - name: Install trunk
        if: inputs.deploy_leptos
        run: cargo install trunk --locked

      - name: Build Leptos QA harness
        if: inputs.deploy_leptos
        working-directory: examples/leptos-qa-harness
        run: trunk build --release --public-url /rust-chorale/leptos/

      # ── Assemble dist/ ──────────────────────────────────────────────────
      - name: Assemble dist/
        run: |
          mkdir -p dist

          if [ "${{ inputs.deploy_dioxus }}" = "true" ]; then
            mkdir -p dist/dioxus
            # dx build (0.7.x) outputs to dist/ inside the package directory.
            # Fall back to the workspace-root target path used by some versions.
            if [ -d "examples/qa-harness/dist" ]; then
              cp -r examples/qa-harness/dist/. dist/dioxus/
            elif [ -d "target/dx/qa-harness/release/web/public" ]; then
              cp -r target/dx/qa-harness/release/web/public/. dist/dioxus/
            else
              echo "::error::could not locate dx build output"
              find examples/qa-harness -name "*.wasm" 2>/dev/null | head -5
              exit 1
            fi
          fi

          if [ "${{ inputs.deploy_leptos }}" = "true" ]; then
            mkdir -p dist/leptos
            if [ -d "examples/leptos-qa-harness/dist" ]; then
              cp -r examples/leptos-qa-harness/dist/. dist/leptos/
            else
              echo "::error::could not locate trunk build output"
              exit 1
            fi
          fi

          cp docs/landing-index.html dist/index.html
          touch dist/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
