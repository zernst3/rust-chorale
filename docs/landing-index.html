<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>chorale — headless Rust table components</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .hero {
      text-align: center;
      max-width: 600px;
    }
    .logo {
      font-size: 2.75rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #0f172a;
    }
    .logo span { color: #0078d4; }
    .tagline {
      margin-top: 0.75rem;
      font-size: 1.1rem;
      color: #475569;
      line-height: 1.6;
    }
    .buttons {
      margin-top: 2.5rem;
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-dioxus {
      background: #0078d4;
      color: #fff;
    }
    .btn-leptos {
      background: #ef4444;
      color: #fff;
    }
    .badge {
      background: rgba(255,255,255,0.25);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
    }
    footer {
      margin-top: 3rem;
      font-size: 0.8rem;
      color: #94a3b8;
      text-align: center;
    }
    footer a {
      color: #64748b;
      text-decoration: none;
    }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <main class="hero">
    <div class="logo">chorale<span>.</span></div>
    <p class="tagline">
      Framework-agnostic headless table components for Rust web apps.<br />
      Pure immutable state transitions — plug into Dioxus or Leptos.
    </p>
    <div class="buttons">
      <a href="/rust-chorale/dioxus/" class="btn btn-dioxus">
        Dioxus demo <span class="badge">0.7</span>
      </a>
      <a href="/rust-chorale/leptos/" class="btn btn-leptos">
        Leptos demo <span class="badge">0.8</span>
      </a>
    </div>
  </main>
  <footer>
    <p>chorale v0.2.0 &mdash;
      <a href="https://github.com/zernst3/rust-chorale" target="_blank" rel="noopener">
        github.com/zernst3/rust-chorale
      </a>
    </p>
  </footer>
</body>
</html>
